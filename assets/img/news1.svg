<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="n1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#n1bg)"/>
  <!-- Musrenbang scene - meeting -->
  <rect x="80" y="120" width="440" height="200" fill="white" opacity="0.1" rx="8"/>
  <!-- Long table -->
  <rect x="120" y="220" width="360" height="20" fill="#8D6E63" opacity="0.4" rx="4"/>
  <!-- U-shape seating -->
  <!-- People around table -->
  <circle cx="180" cy="200" r="14" fill="white" opacity="0.3"/>
  <rect x="172" y="214" width="16" height="10" fill="white" opacity="0.2" rx="3"/>
  <circle cx="240" cy="195" r="13" fill="white" opacity="0.25"/>
  <rect x="233" y="208" width="14" height="14" fill="white" opacity="0.2" rx="3"/>
  <circle cx="300" cy="198" r="14" fill="white" opacity="0.3"/>
  <rect x="292" y="212" width="16" height="10" fill="#F39C12" opacity="0.3" rx="3"/>
  <circle cx="360" cy="195" r="13" fill="white" opacity="0.25"/>
  <rect x="353" y="208" width="14" height="14" fill="white" opacity="0.2" rx="3"/>
  <circle cx="420" cy="200" r="14" fill="white" opacity="0.3"/>
  <rect x="412" y="214" width="16" height="10" fill="white" opacity="0.2" rx="3"/>
  <!-- People on other side -->
  <circle cx="200" cy="270" r="12" fill="white" opacity="0.2"/>
  <circle cx="260" cy="275" r="11" fill="white" opacity="0.18"/>
  <circle cx="320" cy="272" r="12" fill="white" opacity="0.2"/>
  <circle cx="380" cy="275" r="11" fill="white" opacity="0.18"/>
  <!-- Documents on table -->
  <rect x="200" y="222" width="20" height="14" fill="white" opacity="0.15" rx="1"/>
  <rect x="280" y="223" width="20" height="14" fill="white" opacity="0.15" rx="1"/>
  <rect x="360" y="222" width="20" height="14" fill="white" opacity="0.15" rx="1"/>
  <!-- Projector screen -->
  <rect x="220" y="100" width="160" height="100" fill="white" opacity="0.12" rx="3"/>
  <text x="300" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="white" opacity="0.3" font-weight="bold">MUSRENBANG</text>
  <text x="300" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="white" opacity="0.25">2026</text>
  <!-- Banner -->
  <rect x="120" y="80" width="360" height="25" fill="white" opacity="0.12" rx="4"/>
  <text x="300" y="97" text-anchor="middle" font-family="Arial" font-size="11" fill="white" opacity="0.35" font-weight="bold">FORUM MUSRENBANG KELURAHAN PETAMBURAN</text>
  <!-- Floor pattern -->
  <rect x="0" y="330" width="600" height="70" fill="white" opacity="0.05"/>
</svg>
