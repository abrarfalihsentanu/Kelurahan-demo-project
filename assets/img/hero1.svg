<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#283593;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1400" height="500" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="80" rx="80" ry="30" fill="white" opacity="0.15"/>
  <ellipse cx="250" cy="70" rx="60" ry="25" fill="white" opacity="0.1"/>
  <ellipse cx="900" cy="100" rx="100" ry="35" fill="white" opacity="0.12"/>
  <ellipse cx="1200" cy="60" rx="70" ry="25" fill="white" opacity="0.1"/>
  <!-- Building silhouettes (kelurahan office) -->
  <rect x="400" y="180" width="600" height="220" fill="#37474F" rx="4"/>
  <rect x="420" y="160" width="560" height="20" fill="#455A64"/>
  <!-- Roof -->
  <polygon points="400,180 700,130 1000,180" fill="#C0392B" opacity="0.9"/>
  <polygon points="420,180 700,140 980,180" fill="#E74C3C" opacity="0.7"/>
  <!-- Windows -->
  <rect x="450" y="210" width="50" height="60" fill="#FFF9C4" opacity="0.8" rx="3"/>
  <rect x="530" y="210" width="50" height="60" fill="#FFF9C4" opacity="0.6" rx="3"/>
  <rect x="610" y="210" width="50" height="60" fill="#FFF9C4" opacity="0.8" rx="3"/>
  <rect x="740" y="210" width="50" height="60" fill="#FFF9C4" opacity="0.6" rx="3"/>
  <rect x="820" y="210" width="50" height="60" fill="#FFF9C4" opacity="0.8" rx="3"/>
  <rect x="900" y="210" width="50" height="60" fill="#FFF9C4" opacity="0.6" rx="3"/>
  <!-- Door -->
  <rect x="660" y="300" width="80" height="100" fill="#5D4037" rx="3"/>
  <rect x="665" y="305" width="70" height="55" fill="#FFF9C4" opacity="0.4" rx="2"/>
  <circle cx="725" cy="355" r="4" fill="#F39C12"/>
  <!-- Steps -->
  <rect x="640" y="400" width="120" height="10" fill="#78909C" rx="2"/>
  <rect x="630" y="410" width="140" height="10" fill="#607D8B" rx="2"/>
  <!-- Flag pole -->
  <rect x="350" y="120" width="3" height="280" fill="#9E9E9E"/>
  <rect x="353" y="120" width="50" height="30" fill="#E74C3C"/>
  <rect x="353" y="150" width="50" height="30" fill="white"/>
  <!-- Trees -->
  <circle cx="250" cy="330" r="50" fill="#2E7D32" opacity="0.8"/>
  <circle cx="270" cy="310" r="40" fill="#388E3C" opacity="0.7"/>
  <rect x="255" y="360" width="8" height="40" fill="#5D4037"/>
  <circle cx="1150" cy="320" r="55" fill="#2E7D32" opacity="0.8"/>
  <circle cx="1170" cy="300" r="45" fill="#388E3C" opacity="0.7"/>
  <rect x="1155" y="355" width="8" height="45" fill="#5D4037"/>
  <!-- Ground -->
  <rect x="0" y="400" width="1400" height="100" fill="url(#ground)"/>
  <!-- Path -->
  <path d="M660 420 Q680 450 700 500" stroke="#9E9E9E" stroke-width="60" fill="none" opacity="0.3"/>
  <!-- Sign board -->
  <rect x="140" y="300" width="160" height="80" fill="white" rx="5" opacity="0.9"/>
  <rect x="145" y="305" width="150" height="70" fill="none" stroke="#C0392B" stroke-width="2" rx="3"/>
  <text x="220" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C0392B">KELURAHAN</text>
  <text x="220" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#C0392B">PETAMBURAN</text>
  <text x="220" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#666">Tanah Abang, Jakarta Pusat</text>
  <rect x="216" y="380" width="8" height="20" fill="#795548"/>
  <!-- People silhouettes -->
  <circle cx="560" cy="385" r="8" fill="#455A64" opacity="0.6"/>
  <rect x="554" y="393" width="12" height="20" fill="#455A64" opacity="0.6" rx="3"/>
  <circle cx="590" cy="388" r="7" fill="#546E7A" opacity="0.5"/>
  <rect x="585" y="395" width="10" height="18" fill="#546E7A" opacity="0.5" rx="3"/>
  <circle cx="850" cy="383" r="8" fill="#455A64" opacity="0.6"/>
  <rect x="844" y="391" width="12" height="22" fill="#455A64" opacity="0.6" rx="3"/>
</svg>
