<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)" rx="12"/>
  <!-- School building -->
  <rect x="130" y="75" width="140" height="80" rx="4" fill="#FFF" stroke="#1565C0" stroke-width="2"/>
  <polygon points="120,78 200,40 280,78" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <!-- Door -->
  <rect x="185" y="115" width="30" height="40" rx="3" fill="#1565C0"/>
  <circle cx="210" cy="137" r="3" fill="#FFF"/>
  <!-- Windows -->
  <rect x="145" y="90" width="22" height="18" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="235" y="90" width="22" height="18" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="145" y="118" width="22" height="18" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="235" y="118" width="22" height="18" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Flag -->
  <line x1="200" y1="20" x2="200" y2="42" stroke="#0D47A1" stroke-width="2"/>
  <rect x="200" y="20" width="18" height="12" rx="2" fill="#C0392B"/>
  <rect x="200" y="32" width="18" height="12" rx="2" fill="#FFF" stroke="#ddd" stroke-width=".5"/>
  <!-- Books -->
  <rect x="305" y="100" width="12" height="40" rx="2" fill="#1565C0"/><rect x="320" y="105" width="12" height="35" rx="2" fill="#42A5F5"/><rect x="335" y="110" width="12" height="30" rx="2" fill="#90CAF9"/>
  <!-- Graduation cap -->
  <polygon points="80,90 110,75 140,90 110,105" fill="#1565C0"/>
  <line x1="110" y1="90" x2="110" y2="115" stroke="#1565C0" stroke-width="2"/>
  <rect x="105" y="115" width="10" height="4" rx="2" fill="#1565C0"/>
  <!-- Banner -->
  <rect x="115" y="165" width="170" height="24" rx="12" fill="#1565C0"/>
  <text x="200" y="182" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-weight="700" font-size="11" fill="#FFF">22 Sarana Pendidikan</text>
</svg>